<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Finder</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Initial UI layout structure -->
    <header> 
        <h1>Weather Finder</h1>
    </header>

    <div class="container">
        <div class="section search-sectin">
            <h2>Search for a city</h2>
            <p>Type a city or select from the list</p>

            <div class="search">
                <input type="text" id="cityInput" placeholder="Type a city...">
                <button id="viewCityButton">Get Weather</button>
            </div>

            <h3>Weather display screen</h3>
            <div id="weather">
                <p>Type a city and click get weather</p>
            </div>
        </div>

        <div class="section top 10">
            <h2>Top 10 Canadian Cities</h2>            
            <ul id="top10">
                <li data-city="Vancouver">Vancouver</li>
                <li data-city="Toronto">Toronto</li>
                <li data-city="Calgary">Calgary</li>
                <li data-city="Montreal">Montreal</li>
                <li data-city="Hamilton">Hamilton</li>
                <li data-city="Edmonton">Edmonton</li>
                <li data-city="Winnipeg">Winnipeg</li>
                <li data-city="Ottawa">Ottawa</li>
                <li data-city="Halifax">Halifax</li>
                <li data-city="Quebec City">Québec</li>
            </ul>
        </div>
    </div>

    <footer>Weather finder</footer>

    <script src="js/app.js"></script>
    
</body>
</html>
