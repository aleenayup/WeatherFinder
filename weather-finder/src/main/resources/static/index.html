<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Finder</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header> 
        <h1>Weather Finder</h1>
    </header>

    <div class="container">
        <div class="section search-section">
            <h2>Search for a city</h2>
            <p>Type a city or select from the list</p>

            <div class="search">
                <input type="text" id="cityInput" placeholder="Type a city...">
                <button id="viewCityButton">Get Weather</button>
            </div>

            <h3>Weather display screen</h3>
            <div id="weather">
                <p>Type a city and click get weather</p>

            </div>
        </div>
    </div>
    
</body>
</html>
